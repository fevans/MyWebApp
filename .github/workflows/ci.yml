on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore MyWebApp.sln

      - name: Build
        run: dotnet build MyWebApp.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MyWebApp.sln --configuration Release --no-restore

